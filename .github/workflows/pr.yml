name: PR workflow

on:
  pull_request:
    branches:
      - main
      - hotfix/*
      - feature/*
    types:
      - opened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xk6-fido2
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            gofmt -d .
            exit 1
          fi
